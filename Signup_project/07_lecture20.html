//Signup Project//

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup page</title>
    <!-- Creating style tag -->
    <!-- style Enter -->
    <style>
        /* Styling for body */
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            background-color: #d5d4d4;
            border-radius: 8px;
            padding: 30px;
            width: 600px;
        }
        h2{
            color: #1a50a0;
            text-align: center;
            margin-bottom: 20px;
        }
        form{
            display: flex;
            flex-direction: column;
        }
        input{
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid black;
            background-color: #d8d8d8;
        }
        button{
            background-color: #1b81da;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
        }
        button:hover{
            background-color: #0741ac;
        }
    </style>
</head>
<body>
    <!-- Creating a div container -->
    <!-- div.card Enter-->
    <div class="card">
        <!-- Creating h2 tag -->
        <h2>Signup</h2>
        <!-- Creating form -->
        <!-- form Enter and remove action attribute -->
        <form>
            <!-- Taking input from user -->
            <!-- input Enter select email from the dropdown menu and type placeholder attribute and write Email inside that attribute -->
            <input type="email" name="" id="" placeholder="Email">
            <!-- Taking input from user -->
            <!-- input Enter select password from the dropdown menu and type placeholder attribute and write Password inside that attribute -->
            <input type="password" name="" id="" placeholder="Password">
            <!-- Taking input from user -->
            <!-- input Enter and remove text inside type attribute and add firstname inside that attribute and add placeholder attribute and write First name inside that attribute -->
            <input type="firstname" name="" id="" placeholder="First name">
            <!-- Taking input from user -->
            <!-- input Enter and remove text inside type attribute and add lastname inside that attribute and add placeholder attribute and write Last name inside that attribute -->
            <input type="lastname" name="" id="" placeholder="Last name">
            <!-- Creating button -->
            <!-- Select submit from dropdown menu --> 
            <button type="submit">Signup</button>
        </form>
    </div>
</body>
</html>
